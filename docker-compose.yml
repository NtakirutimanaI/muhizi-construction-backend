version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: profile-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: profile_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - profile-network

  redis:
    image: redis:7-alpine
    container_name: profile-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - profile-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: profile-api
    restart: always
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: profile_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
    depends_on:
      - postgres
      - redis
    networks:
      - profile-network

volumes:
  postgres_data:
  redis_data:

networks:
  profile-network:
    driver: bridge
